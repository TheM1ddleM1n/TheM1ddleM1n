name: Mark Notifications

on:
  schedule:
    - cron: '0 0 */14 * *'
  workflow_dispatch:

jobs:
  mark-read:
    runs-on: ubuntu-latest

    steps:
      - name: Check for unread notifications
        id: check_notifications
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}
        run: |
          COUNT=$(curl -s \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/notifications | jq '. | length')
          echo "Unread notifications: $COUNT"
          echo "count=$COUNT" >> $GITHUB_OUTPUT

      - name: Mark all notifications as read
        id: mark_notifications
        if: steps.check_notifications.outputs.count != '0'
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}
        run: |
          echo "Starting notification marking process..."

          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          RESPONSE=$(curl -s -w "\n%{http_code}" -X PUT \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/notifications \
            -d '{"last_read_at":"'"$TIMESTAMP"'"}')

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" -eq 205 ] || [ "$HTTP_CODE" -eq 200 ]; then
            echo "✓ Successfully marked all notifications as read"
            echo "Timestamp: $TIMESTAMP"
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "✗ Failed to mark notifications as read"
            echo "HTTP Status: $HTTP_CODE"
            echo "Response: $BODY"
            echo "status=failure" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Summary
        if: always()
        run: |
          echo "----------------------------------------"
          echo "Workflow Execution Summary"
          echo "----------------------------------------"
          echo "Completed at: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          echo "Job status: ${{ job.status }}"
          echo "Unread count at start: ${{ steps.check_notifications.outputs.count }}"
          echo "Mark status: ${{ steps.mark_notifications.outputs.status || 'skipped (no notifications)' }}"
          echo "----------------------------------------"
